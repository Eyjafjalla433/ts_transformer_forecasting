# Active baseline config (recommended for current stage)
model:
  src_dim: 5
  tgt_dim: 1
  out_dim: 1
  N: 2
  d_model: 64
  d_ff: 128
  h: 4
  dropout: 0.1

# Original Transformer paper-scale setting (kept for future ablation)
# model:
#   src_dim: 6
#   tgt_dim: 1
#   out_dim: 1
#   N: 6
#   d_model: 512
#   d_ff: 2048
#   h: 8
#   dropout: 0.1

data:
  batch_size: 16
  input_length: 24
  pred_length: 12
  train_csv: "data/processed/NASDAQ_wide.csv"
  train_csv_has_header: true
  synthetic_total_steps: 1000

train:
  lr: 0.001
  epochs: 20
  val_ratio: 0.2
  accum_iter: 1
  split_seed: 42
  device: "cpu"

infer:
  device: "cpu"
  checkpoint_path: "checkpoints/model.pt"
  input_path: "data/infer_input.csv"
  input_has_header: true
  start_token_mode: "zeros"  # options: zeros, last
  normalization_stats_path: null  # JSON with input_mean/input_std/target_mean/target_std
  output_path: "outputs/predictions.csv"

